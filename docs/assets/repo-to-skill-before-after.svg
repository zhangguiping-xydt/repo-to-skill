<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#73E5F3"/>
      <stop offset="100%" stop-color="#73E5F3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#91F2B6"/>
      <stop offset="100%" stop-color="#91F2B6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#73E5F3"/>
      <stop offset="100%" stop-color="#91F2B6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="42" fill="#07131A"/>
  <circle cx="1040" cy="70" r="220" fill="url(#cyanGlow)" opacity="0.30"/>
  <circle cx="150" cy="560" r="240" fill="url(#greenGlow)" opacity="0.22"/>

  <text x="84" y="74" fill="#73E5F3" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" letter-spacing="3">BEFORE  &#8594;  AFTER</text>
  <text x="84" y="118" fill="#EAF6F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="760" letter-spacing="-0.8">Give your AI coding agent a map first</text>
  <text x="84" y="152" fill="#8EA8B2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">repo-to-skill turns a local repository into a portable map it can read before editing.</text>

  <!-- BEFORE panel -->
  <g transform="translate(84 185)">
    <rect width="448" height="362" rx="28" fill="#0B1419" stroke="#243A45"/>
    <!-- header icon: folder with ? -->
    <g transform="translate(366 26)" stroke="#5C7A86" stroke-width="2.4" fill="none">
      <path d="M2 14H16L21 8H46V40H2Z"/>
      <text x="24" y="33" fill="#5C7A86" stroke="none" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800" text-anchor="middle">?</text>
    </g>
    <text x="34" y="56" fill="#D7E3E8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="730">Without a map</text>
    <text x="34" y="82" fill="#7E929C" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">the agent enters cold</text>
    <path d="M34 104H414" stroke="#243A45" stroke-width="1"/>

    <g fill="#9DB2BA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">
      <circle cx="44" cy="146" r="9" fill="none" stroke="#5C7A86" stroke-width="2.2"/>
      <text x="66" y="152">Guesses which folders matter</text>
      <circle cx="44" cy="200" r="9" fill="none" stroke="#5C7A86" stroke-width="2.2"/>
      <text x="66" y="206">Treats generated files as real code</text>
      <circle cx="44" cy="254" r="9" fill="none" stroke="#5C7A86" stroke-width="2.2"/>
      <text x="66" y="260">Spends context just exploring</text>
      <circle cx="44" cy="308" r="9" fill="none" stroke="#5C7A86" stroke-width="2.2"/>
      <text x="66" y="314">Confident but mis-scoped edits</text>
    </g>
  </g>

  <!-- center arrow -->
  <text x="600" y="332" fill="#73E5F3" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" letter-spacing="2" text-anchor="middle">GENERATE</text>
  <g>
    <rect x="548" y="360" width="86" height="12" rx="6" fill="url(#arrowGrad)"/>
    <path d="M630 350L662 366L630 382Z" fill="#91F2B6"/>
  </g>
  <text x="600" y="416" fill="#8EA8B2" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" letter-spacing="1" text-anchor="middle">skill pack</text>

  <!-- AFTER panel -->
  <g transform="translate(668 185)">
    <rect width="448" height="362" rx="28" fill="#0B1D27" stroke="#2E6072"/>
    <!-- header icon: map / node graph -->
    <g transform="translate(372 24)">
      <circle cx="6" cy="10" r="7" fill="#73E5F3"/>
      <circle cx="44" cy="8" r="7" fill="#91F2B6"/>
      <circle cx="26" cy="40" r="7" fill="#F5C56B"/>
      <path d="M11 12L39 11M9 16L23 35M40 14L29 35" stroke="#3C7182" stroke-width="2.4" stroke-linecap="round"/>
    </g>
    <text x="34" y="56" fill="#EAF6F8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="730">With repo-to-skill</text>
    <text x="34" y="82" fill="#73E5F3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">the agent starts oriented</text>
    <path d="M34 104H414" stroke="#2E6072" stroke-width="1"/>

    <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#DCEAEE">
      <g transform="translate(35 137)">
        <circle r="11" fill="#112B35" stroke="#73E5F3" stroke-width="2"/>
        <path d="M-5 0L-1 4L6 -5" stroke="#91F2B6" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>
      <text x="62" y="152">Source vs generated, separated</text>
      <g transform="translate(35 191)">
        <circle r="11" fill="#112B35" stroke="#73E5F3" stroke-width="2"/>
        <path d="M-5 0L-1 4L6 -5" stroke="#91F2B6" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>
      <text x="62" y="206">Clear task entry points</text>
      <g transform="translate(35 245)">
        <circle r="11" fill="#112B35" stroke="#73E5F3" stroke-width="2"/>
        <path d="M-5 0L-1 4L6 -5" stroke="#91F2B6" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>
      <text x="62" y="260">Likely-related modules linked</text>
      <g transform="translate(35 299)">
        <circle r="11" fill="#112B35" stroke="#73E5F3" stroke-width="2"/>
        <path d="M-5 0L-1 4L6 -5" stroke="#91F2B6" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>
      <text x="62" y="314">Safe validation steps listed</text>
    </g>
  </g>

  <path d="M84 566H1116" stroke="#173240" stroke-width="1" opacity="0.7"/>
  <text x="600" y="596" fill="#4C7C8C" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" letter-spacing="0.5" text-anchor="middle">Local-first  &#183;  no source upload  &#183;  never changes the target repo  &#183;  deterministic</text>
</svg>
